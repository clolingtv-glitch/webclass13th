<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>예제</title>
</head>
<body>
    <h1>CREATE YOUR ACCOUNT</h1>
    <form action="#"></form>
        <div>
            <label for="user-email">Email Address</label>
            <input type="text" name="user-email" id="user-email">
        </div>
         <div>
            <label for="user-confirm">Confirm your Address</label>
            <input type="text" name="user-confirm" id="user-confirm">
        </div>
        <div>
            <label for="user-conutry">Country of Residence</label>
            <select name="user-conutry" id="user-conutry">
                <option value="AlandIslands">Aland Islands</option>
                <option value="Bahamas">Bahamas</option>
                <option value="China">China</option>
                <option value="Denmark">Denmark</option>
                <option value="Egypt">Egypt</option>
                <option value="France">France</option>
                <option value="UnitedKingdom">United Kingdom</option>
                <option value="Korea" selected>Korea, Republic of</option>
            </select>
        </div>
        <div>
            <input type="checkbox" name="agree" id="agree">
            <label for="agree">I am 13 years of age or older and agree to the terms of the <i>Steam Subscriber Agreement</i> and the <i>Valve Privacy Policy.</i></label>
        </div>
        <button type="submit">Continue</button>
    </form>
</body>
</html>
