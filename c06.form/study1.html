<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>양식</title>
</head>
<body>
    <form action="#">
        <div>
            <label for="user-id">아이디</label>
            <input type="text" id="user-id" placeholder="아이디를 입력해주세요" required>
        </div>
        <div>
            <label for="user-pw">비밀번호</label>
            <input type="password" id="user-pw" placeholder="비밀번호를 입력해주세요" required>
        </div>
        <input type="submit" value="로그인">
    </form>

    <hr>

    <form action="#" enctype="multipart/form-data">
        <fieldset>
            <legend>계정정보</legend>
            <div>
                <label for="userId">아이디</label>
                <input type="text" id="userId" name="userId"
                value="wlqrkffo" disabled>
            </div>
            <div>
                <label for="userPw">비밀번호</label>
                <input type="password" id="userPw">
            </div>
            <div>
                <label for="userPw2">비밀번호확인</label>
                <input type="password" id="userPw2">
            </div>
            <p>비밀번호는 영대문자와 영소문자 그리고 특수문자를 포함시켜주세요</p>
        </fieldset>
        <fieldset>
            <legend>개인 정보</legend>
            <div>
                <label for="userName">이름</label>
                <input type="text" id="userName" name="userName" value="정신차려이각박한세상속에서">
            </div>
            <div>
                <label for="userGender">성별</label>
                <input type="radio" id="man"name="userGender">
                <label for="man">남자</label>
                <input type="radio" id="woman" name="userGender" checked>
                <label for="woman">여자</label>
                <input type="radio" id="nochoice" name="userGender">
                <label for="nochoice">선택안함</label>
            </div>
            <div>
                <label for="userBirth">생년월일</label>
                <input type="date" id="userBirth" name="userBirth">
            </div>
            <div>
                <label for="userService">전화번호</label>
                <select name="service" id="userService">
                    <option value="KT">KT</option>
                    <option value="SKT" selected>SKT</option>
                    <option value="lgU">U+</option>
                    <option value="알뜰폰">알뜰폰</option>
                    <option value="선택안함">선택안함</option>
                </select>
                <input type="number" name="phoneNumber" value="01012345678">
                <a href="#">인증 요청</a>
            </div>
            <div>
                <label for="confirmNumber">인증 확인번호</label>
                <input type="number" id="confirmNumber" name="confirmNumber">
            </div>
        </fieldset>
        <fieldset>
            <legend>기타 정보</legend>
            <div>
                <label for="userphoto">프로필사진</label>
                <input type="file" id="userphoto" name="userphoto">
            </div>
            <div>
                <label for="">자기소개글</label>
                <textarea id="userProfileText" name="userProfileText" placeholder="자기소개글을 입력해주세요">자기소개글을 입력해주세요</textarea>
            </div>
        </fieldset>
        <fieldset>
            <legend>개인정보처리방침</legend>
            <p>개인정보처리방침 전문</p>
            <div>
                <input type="checkbox" id="userAgeen" name="userAgee">
                <label for="userAgeen">개인정보처리방침에 동의합니다.</label>
            </div>
        </fieldset>
        <fieldset>
            <legend>제출</legend>
            <button type="submit">회원가입하기</button>
            <button type="reset">취소하기</button>
        </fieldset>
    </form>
</body>
</html>
